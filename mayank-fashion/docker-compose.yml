services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mayank_fashion
      JWT_SECRET: change_this_in_production_to_a_long_random_string
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      ADMIN_EMAIL: admin@mayankfashion.com
      ADMIN_PASSWORD: admin123
    volumes:
      - ./backend/uploads:/app/uploads

  seed:
    build: ./backend
    depends_on:
      - mongo
    command: sh -c "sleep 5 && npm run seed"
    environment:
      MONGO_URI: mongodb://mongo:27017/mayank_fashion
      ADMIN_EMAIL: admin@mayankfashion.com
      ADMIN_PASSWORD: admin123
    restart: "no"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:

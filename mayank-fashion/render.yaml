services:
  - type: web
    name: mayank-fashion-api
    runtime: node
    rootDir: mayank-fashion/backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        value: admin@mayankfashion.com
      - key: ADMIN_PASSWORD
        value: admin123
